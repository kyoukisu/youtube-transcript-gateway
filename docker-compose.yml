services:
  youtube-transcript-gateway:
    build:
      context: .
    container_name: youtube-transcript-gateway
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "8091:8091"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
